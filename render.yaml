# Blueprint de Render (https://render.com/docs/infrastructure-as-code)
#
# Permite desplegar este proyecto en Render de forma reproducible, ya sea
# conectando el repo manualmente ("New +" -> "Blueprint") o vía el botón
# "Deploy to Render" del README.
#
# NOTA sobre persistencia: el plan Free de Render no incluye disco.

services:
  - type: web
    name: healthcare-fhir-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: STORAGE_MODE
        value: json
