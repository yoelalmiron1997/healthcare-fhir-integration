name: CI/CD

# Corre en cada push (cualquier rama) y en cada Pull Request contra main.
# Así, ya sea que trabajes directo en una rama o abras un PR, vas a ver
# si tus cambios rompen algo antes de mergear.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # 1) Tests automatizados (pytest)
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pytest
        run: pytest tests/ -v

  # 2) Validar que la imagen Docker sigue construyendo bien
  #    (no se publica a ningún registry, solo se valida que el build no rompa)
  docker-build:
    name: Build de la imagen Docker (validación)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de la imagen (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: healthcare-fhir-api:ci

  # 3) Deploy automático a Render, solo si:
  #    - los tests pasaron
  #    - la imagen Docker construye bien
  #    - el push fue directo a la rama main (no en PRs ni otras ramas)
  #
  #    Requiere configurar el secret RENDER_DEPLOY_HOOK_URL en:
  #    GitHub -> Settings -> Secrets and variables -> Actions
  #    (la URL del Deploy Hook se genera en Render: Service -> Settings -> Deploy Hook)
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Disparar deploy en Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL no está configurado como secret todavía."
            echo "El deploy automático se omite (esto no es un error)."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
